services:
  postgres:
    image: postgres:16-alpine
    container_name: movie-review-postgres
    restart: unless-stopped
    ports:
      - "5432:5432"
    environment:
      POSTGRES_USER: movie_review
      POSTGRES_PASSWORD: movie_review_dev
      POSTGRES_DB: movie_review_dev
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U movie_review -d movie_review_dev"]
      interval: 5s
      timeout: 3s
      retries: 5

volumes:
  postgres_data:
